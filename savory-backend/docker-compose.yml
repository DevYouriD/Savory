services:
  mongodb:
    image: mongo:8
    container_name: savory-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
#    environment:
#      MONGO_INITDB_ROOT_USERNAME: admin
#      MONGO_INITDB_ROOT_PASSWORD: root
    networks:
      - savory-net
    volumes:
      - savorydb-data:/data/db

#  mysqldb:
#    image: mysql:latest
#    container_name: savory-auth-db
#    restart: unless-stopped
#    ports:
#      - "3306:3306"
#    environment:
#      MYSQL_ROOT_PASSWORD: root
#      MYSQL_DATABASE: savoryauthdb
#      MYSQL_USER: admin
#      MYSQL_PASSWORD: root
#    networks:
#      - savory-net
#    volumes:
#      - savory-auth-data:/var/lib/mysql

  mongo-express:
    image: mongo-express:latest
    container_name: savory-mongo-ui
    depends_on:
      - mongodb
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
#      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
#      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: root
    networks:
      - savory-net

volumes:
  savorydb-data:
#  savory-auth-data:

networks:
  savory-net:
    driver: bridge