#    container_name: savory-backend
#    restart: unless-stopped
#    ports:
#      - "8080:8080"
#    networks:
#      - savory-net
    # depends_on:
    #   - mongodb
    #   - mysqldb

volumes:
  savorydb-data:
  savory-auth-data:

networks:
  savory-net:
    driver: bridge