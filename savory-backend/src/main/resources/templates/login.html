<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
<div class="bg-gray-800 p-8 rounded-lg shadow-md w-full max-w-sm">
    <form th:action="@{/login}" method="post" class="space-y-4">
        <h2 class="text-2xl font-bold text-center">Login</h2>
        <input type="text" name="username" placeholder="Username"
               class="w-full px-4 py-2 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <input type="password" name="password" placeholder="Password"
               class="w-full px-4 py-2 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-200">
            Login
        </button>
    </form>

    <!-- Register redirect -->
    <div class="text-center mt-4">
        <p class="text-sm text-gray-400">Don't have an account?</p>
        <a th:href="@{/register}"
           class="inline-block mt-2 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded transition duration-200">
            Register
        </a>
    </div>
</div>
</body>
</html>
