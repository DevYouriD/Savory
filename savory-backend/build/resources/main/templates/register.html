<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
<div class="bg-gray-800 p-8 rounded-lg shadow-md w-full max-w-sm">
  <form th:action="@{/register}" method="post" class="space-y-4">

    <h2 class="text-2xl font-bold text-center">Register</h2>
    <input type="text" name="username" placeholder="Username" class="w-full px-4 py-2 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
    <input type="password" name="password" placeholder="Password" class="w-full px-4 py-2 bg-gray-700 text-white rounded focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded transition duration-200">
      Register
    </button>

  </form>
</div>

<!--  User already exists popup  -->
<div id="errorModal"
     th:if="${errorMessage}"
     class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">

  <div class="bg-white text-black rounded-lg p-6 max-w-sm w-full shadow-lg">
    <h2 class="text-xl font-bold mb-2 text-center">Error</h2>
    <p th:text="${errorMessage}" class="mb-4 text-center"></p>

    <!-- Center the button -->
    <div class="flex justify-center">
      <button onclick="closeModal()" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded">
        Close
      </button>
    </div>
  </div>
</div>

<script>
  function closeModal() {
      const modal = document.getElementById('errorModal');
      modal.style.display = 'none';
  }
</script>
</body>
</html>
